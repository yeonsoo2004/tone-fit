<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONE:FIT - Space Concept</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/nomalize.css">
    <link rel="stylesheet" href="../assets/css/font.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/component.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/space.css">
</head>
<body class="space-page">
    <div data-include="../assets/components/header-sub.html"></div>

    <main class="sub-main space-main">
        <section class="space-concept-section py-130 bg-light-gray">
            <div class="inner d-flex flex-col ai-center space-concept-inner">
                <div class="space-concept-head">
                    <h1 class="space-main-title title color-point ft-48-r">TONE:FIT Concept</h1>
                    <div class="lnb-tab-bar space-tab-bar" role="tablist" aria-label="Space concept">
                        <button type="button" class="lnb-tab-btn tab-btn ft-20-r active" role="tab" aria-selected="true" aria-controls="panel-pinkish-mood" data-panel="pinkish-mood">Pinkish Mood</button>
                        <button type="button" class="lnb-tab-btn tab-btn ft-20-r" role="tab" aria-selected="false" aria-controls="panel-point-modern" data-panel="point-modern">Point Modern</button>
                        <button type="button" class="lnb-tab-btn tab-btn ft-20-r" role="tab" aria-selected="false" aria-controls="panel-pure-modern" data-panel="pure-modern">Pure Modern</button>
                    </div>
                </div>

                <div class="space-tab-panels">
                    <div class="space-tab-panel is-active" id="panel-pinkish-mood" role="tabpanel" data-panel="pinkish-mood">
                        <div class="space-enter-copy">
                            <h2 class="space-subtitle ft-32-r color-main">Blooming Layer</h2>
                            <p class="space-caption ft-20-sb color-main">아늑한 인디핑크와 세련된 로즈골드로 Z세대의 감성을 자극하는 프라이빗 뷰티 쇼룸 스타일입니다.</p>
                        </div>
                        <div class="space-gallery space-enter-gallery" data-gallery="pinkish-mood">
                            <figure class="space-gallery__main">
                                <img src="../assets/images/pinkish-1.webp" alt="Pinkish Mood 메인 공간" width="662" height="583">
                            </figure>
                            <div class="space-gallery__grid">
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pinkish-2.webp" alt="Pinkish Mood 공간 2">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pinkish-4.webp" alt="Pinkish Mood 공간 4">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pinkish-3.webp" alt="Pinkish Mood 공간 3">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pinkish-5.webp" alt="Pinkish Mood 공간 5">
                                </figure>
                            </div>
                        </div>
                    </div>
                    <div class="space-tab-panel" id="panel-point-modern" role="tabpanel" data-panel="point-modern" hidden>
                        <div class="space-enter-copy">
                            <h2 class="space-subtitle ft-32-r color-main">MID-CENTURY MODERN</h2>
                            <p class="space-caption ft-20-sb color-main">심플함 속에 세련된 컬러 한두 가지로 변주를 주는 스타일입니다.</p>
                        </div>
                        <div class="space-gallery space-enter-gallery" data-gallery="point-modern">
                            <figure class="space-gallery__main">
                                <img src="../assets/images/color-point-1.webp" alt="Point Modern 메인 공간" width="662" height="583">
                            </figure>
                            <div class="space-gallery__grid">
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/color-point-2.webp" alt="Point Modern 공간 2">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/color-point-4.webp" alt="Point Modern 공간 4">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/color-point-3.webp" alt="Point Modern 공간 3">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/color-point-5.webp" alt="Point Modern 공간 5">
                                </figure>
                            </div>
                        </div>
                    </div>
                    <div class="space-tab-panel" id="panel-pure-modern" role="tabpanel" data-panel="pure-modern" hidden>
                        <div class="space-enter-copy">
                            <h2 class="space-subtitle ft-32-r color-main">MINIMALISM STUDIO</h2>
                            <p class="space-caption ft-20-sb color-main">가장 클래식하면서도 실패 없는 '심플'의 정석 스타일입니다.</p>
                        </div>
                        <div class="space-gallery space-enter-gallery" data-gallery="pure-modern">
                            <figure class="space-gallery__main">
                                <img src="../assets/images/pure-1.webp" alt="Pure Modern 메인 공간" width="662" height="583">
                            </figure>
                            <div class="space-gallery__grid">
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pure-2.webp" alt="Pure Modern 공간 2">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pure-4.webp" alt="Pure Modern 공간 4">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pure-3.webp" alt="Pure Modern 공간 3">
                                </figure>
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pure-5.webp" alt="Pure Modern 공간 5">
                                </figure>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div data-include="../assets/components/footer.html" data-include-base="../"></div>

    <script src="../assets/js/libs/jquery.min.js"></script>
    <script src="../assets/js/libs/gsap.min.js"></script>
    <script src="../assets/js/libs/ScrollTrigger.min.js"></script>
    <script src="../assets/js/include.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/policy-modal.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/franchise.js"></script>
</body>
</html>
