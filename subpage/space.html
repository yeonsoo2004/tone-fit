    <main class="sub-main space-main">
        <section class="space-concept-section py-130">
            <div class="inner d-flex flex-col ai-center space-concept-inner">
                <div class="space-concept-head">
                    <h1 class="space-main-title title color-main">TONE:FIT Concept</h1>
                    <div class="space-tab-bar d-flex gap-20 jc-center" role="tablist" aria-label="Space concept">
                        <button type="button" class="tab-btn ft-20-sb color-main active" role="tab" aria-selected="true" aria-controls="panel-pinkish-mood" data-panel="pinkish-mood">Pinkish Mood</button>
                        <button type="button" class="tab-btn ft-20-sb color-main" role="tab" aria-selected="false" aria-controls="panel-color-point-modern" data-panel="color-point-modern">Color Point Modern</button>
                        <button type="button" class="tab-btn ft-20-sb color-main" role="tab" aria-selected="false" aria-controls="panel-pure-modern" data-panel="pure-modern">Pure Modern</button>
                    </div>
                </div>

                <div class="space-tab-panels">
                    <div class="space-tab-panel is-active" id="panel-pinkish-mood" role="tabpanel" data-panel="pinkish-mood">
                        <div class="space-enter-copy">
                            <h2 class="space-subtitle ft-32-b color-main">Blooming Layer</h2>
                            <p class="space-caption ft-20-r color-main">아늑한 인디핑크와 세련된 로즈골드로 Z세대의 감성을 자극하는 프라이빗 뷰티 쇼룸 스타일입니다.</p>
                        </div>
                        <div class="space-gallery space-enter-gallery" data-gallery="pinkish-mood">
                            <figure class="space-gallery__main">
                                <img src="../assets/images/pinkish-1.webp" alt="Pinkish Mood 메인 공간" width="662" height="583">
                            </figure>
                            <div class="space-gallery__grid">
                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pinkish-2.webp" alt="Pinkish Mood 공간 2">

                                <figure class="space-gallery__item">
                                    <img src="../assets/images/pinkish-4.webp" alt="Pinkish Mood 공간 4">

                                <figure class="space-gallery__item">

                            <p class="space-caption ft-20-r color-main">심플함 속에 세련된 컬러 한두 가지로 변주를 주는 스타일입니다.</p>
                        </div>
                        <div class="space-gallery space-enter-gallery" data-gallery="color-point-modern">
                            <figure class="space-gallery__main">

                        </div>
