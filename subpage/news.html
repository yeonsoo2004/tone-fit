<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONE:FIT - 커뮤니티</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/font.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/component.css">
    <link rel="stylesheet" href="../assets/css/news.css">
</head>

<body class="page-news bg-light-gray">
    <div data-include="../assets/components/header-sub.html"></div>

    <!-- ===== MAIN ===== -->
    <main class="news-main">

        <!-- 페이지 타이틀 -->
        <section class="news-title-section">
            <div class="inner">
                <h2 class="news-page-title title ft-48-r color-point">커뮤니티</h2>
            </div>
        </section>

        <!-- LNB 탭 -->
        <section class="news-lnb-section">
            <div class="inner">
                <div class="news-lnb-wrap">
                    <div class="lnb-tab-bar" role="tablist" aria-label="이벤트 분류">
                        <button type="button" class="lnb-tab-btn ft-20-r active" role="tab" aria-selected="true"
                            aria-controls="tab-panel-ongoing" data-tab="ongoing">진행중 이벤트</button>
                        <button type="button" class="lnb-tab-btn ft-20-r" role="tab" aria-selected="false"
                            aria-controls="tab-panel-ended" data-tab="ended">완료된 이벤트</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- 콘텐츠 -->
        <section class="news-content-section">
            <div class="inner">

                <!-- 진행중 이벤트 탭 패널 -->
                <div id="tab-panel-ongoing" role="tabpanel" aria-labelledby="tab-ongoing" class="news-tab-panel"
                    data-panel="ongoing">
                    <div class="news-grid">

                        <!-- 카드 1 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-1">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-1.webp" alt="커뮤니티 이벤트 1">
                            </div>
                        </article>

                        <!-- 카드 2 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-2">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-2.webp" alt="커뮤니티 이벤트 2">
                            </div>
                        </article>

                        <!-- 카드 3 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-3">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-3.webp" alt="커뮤니티 이벤트 3">
                            </div>
                        </article>

                        <!-- 카드 4 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-4">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-4.webp" alt="커뮤니티 이벤트 4">
                            </div>
                        </article>

                        <!-- 카드 5 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-5">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-5.webp" alt="커뮤니티 이벤트 5">
                            </div>
                        </article>

                        <!-- 카드 6 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-6">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-6.webp" alt="커뮤니티 이벤트 6">
                            </div>
                        </article>

                        <!-- 카드 7 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-7">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-7.webp" alt="커뮤니티 이벤트 7">
                            </div>
                        </article>

                        <!-- 카드 8 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-8">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-8.webp" alt="커뮤니티 이벤트 8">
                            </div>
                        </article>

                        <!-- 카드 9 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-9">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-9.webp" alt="커뮤니티 이벤트 9">
                            </div>
                        </article>


                    </div>
                </div>

                <!-- 완료된 이벤트 탭 패널 -->
                <div id="tab-panel-ended" role="tabpanel" aria-labelledby="tab-ended" class="news-tab-panel"
                    data-panel="ended" hidden>
                    <div class="news-grid">

                        <!-- 완료된 이벤트 카드 -->
                        <article class="news-card" role="button" tabindex="0" aria-label="이벤트 상세 보기"
                            data-modal-id="modal-end-1">
                            <div class="news-card-img-wrap">
                                <img src="../assets/images/Community-end.webp" alt="완료된 이벤트">
                                <span class="news-card-ended-label ft-20-r color-white">종료된 이벤트</span>
                            </div>
                        </article>

                    </div>
                </div>

            </div>
        </section>

    </main>

    <!-- ===== MODAL ===== -->
    <div class="news-modal-overlay" id="newsModalOverlay" role="dialog" aria-modal="true" aria-label="이벤트 상세">
        <div class="news-modal" id="newsModal">
            <!-- 닫기 버튼 -->
            <button type="button" class="news-modal-close" id="newsModalClose" aria-label="모달 닫기">
                <img src="../assets/images/icon/Community-modal.svg" alt="닫기">
            </button>
            <!-- 모달 이미지 영역 (JS로 동적 교체) -->
            <div class="news-modal-img-wrap" id="newsModalImgWrap">
                <div class="news-modal-img-placeholder">이미지 준비 중</div>
            </div>
        </div>
    </div>
    <div data-include="../assets/components/footer.html" data-include-base="../"></div>

    <button type="button" class="back-to-top" aria-label="맨 위로 이동">
        <svg class="back-to-top__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 5V19M12 5L6 11M12 5L18 11" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <script src="../assets/js/include.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/back-to-top.js"></script>
    <script src="../assets/js/policy-modal.js"></script>
    <script src="../assets/js/news.js"></script>
</body>

</html>
