<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONE:FIT - 매장 안내</title>

    <link rel="stylesheet" href="../assets/css/reset.css">
    <link rel="stylesheet" href="../assets/css/font.css">
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/component.css">
    <link rel="stylesheet" href="../assets/css/store.css">
</head>
<body class="page-store">
    <script src="../assets/js/libs/jquery.min.js"></script>
    <script src="../assets/js/libs/gsap.min.js"></script>
    <script src="../assets/js/libs/ScrollTrigger.min.js"></script>
    <div data-include="../assets/components/header-sub.html"></div>

    <!-- ===== MAIN ===== -->
    <main class="store-main">

        <!-- 페이지 타이틀 -->
        <section class="store-title-section">
            <div class="inner">
                <h2 class="store-page-title title ft-48-r">매장 안내</h2>
            </div>
        </section>

        <!-- 카카오맵 -->
        <section class="store-map-section">
            <div class="store-map-wrap">
                <div id="kakao-map" role="region" aria-label="TONE:FIT 매장 위치 지도"></div>
            </div>
        </section>

        <!-- 매장 목록 -->
        <section class="store-list-section">
            <div class="store-list-wrap">
                <div class="store-list-header">
                    <p class="store-list-title ft-32-b color-point">매장 현황</p>
                    <p class="store-list-count ft-20-r color-main">전체 8호</p>
                </div>
                <ul class="store-accordion-list" id="storeAccordionList">
                    <!-- JS로 렌더링 -->
                </ul>
            </div>
        </section>

    </main>
    <div data-include="../assets/components/footer.html" data-include-base="../"></div>

    <button type="button" class="back-to-top" aria-label="맨 위로 이동">
        <svg class="back-to-top__icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 5V19M12 5L6 11M12 5L18 11" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>

    <!-- 카카오맵 API -->
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=e86b02fa8d9d08e1a6932749d1faefdf&autoload=false">
    </script>
    <script src="../assets/js/include.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/back-to-top.js"></script>
    <script src="../assets/js/policy-modal.js"></script>
    <script src="../assets/js/store.js"></script>
</body>
</html>
